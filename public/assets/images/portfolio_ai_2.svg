<svg width="600" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgVideo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#162B1C"/>
      <stop offset="100%" style="stop-color:#0D1F12"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgVideo)"/>
  <!-- Video play button -->
  <circle cx="300" cy="200" r="60" fill="#A8C957" opacity="0.3"/>
  <circle cx="300" cy="200" r="45" fill="#A8C957" opacity="0.5"/>
  <polygon points="285,175 285,225 330,200" fill="white" opacity="0.9"/>
  <!-- Waveform -->
  <g stroke="#A8C957" stroke-width="2" opacity="0.4">
    <path d="M100 350 Q150 320 200 350 Q250 380 300 350 Q350 320 400 350 Q450 380 500 350"/>
  </g>
  <text x="300" y="400" font-family="system-ui, sans-serif" font-size="14" fill="#A8C957" text-anchor="middle" opacity="0.7">AI Video</text>
  <text x="300" y="420" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.5">Generated Animation</text>
</svg>
