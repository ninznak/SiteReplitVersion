  </defs>
  <rect width="100%" height="100%" fill="url(#bgMedal)"/>
  <circle cx="300" cy="200" r="100" fill="url(#goldMedal)" opacity="0.6"/>
  <circle cx="300" cy="200" r="80" fill="url(#goldMedal)" opacity="0.8"/>
  <circle cx="300" cy="200" r="60" fill="#0D1F12" opacity="0.5"/>
  <text x="300" y="210" font-family="system-ui, sans-serif" font-size="20" fill="#FFD700" text-anchor="middle" opacity="0.9">MEDAL</text>
  <text x="300" y="350" font-family="system-ui, sans-serif" font-size="14" fill="#A8C957" text-anchor="middle" opacity="0.7">Commemorative Medal</text>
