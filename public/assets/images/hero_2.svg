<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2f1c"/>
      <stop offset="100%" style="stop-color:#0D1F12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#heroBg2)"/>
  <!-- Medal shape -->
  <circle cx="400" cy="280" r="150" fill="url(#gold)" opacity="0.3"/>
  <circle cx="400" cy="280" r="120" fill="url(#gold)" opacity="0.5"/>
  <circle cx="400" cy="280" r="90" fill="#0D1F12" opacity="0.6"/>
  <!-- Relief details -->
  <ellipse cx="400" cy="260" rx="50" ry="60" fill="url(#gold)" opacity="0.4"/>
  <!-- Ribbon -->
  <rect x="370" y="100" width="60" height="80" fill="#3D7A4F" opacity="0.7"/>
  <polygon points="370,180 400,220 430,180" fill="#3D7A4F" opacity="0.7"/>
  <!-- Text -->
  <text x="400" y="480" font-family="system-ui, sans-serif" font-size="20" fill="#A8C957" text-anchor="middle" opacity="0.8">Latest Commission</text>
  <text x="400" y="510" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.5">Custom Medal Design</text>
</svg>
