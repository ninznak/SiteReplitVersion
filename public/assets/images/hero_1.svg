<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F12"/>
      <stop offset="100%" style="stop-color:#162B1C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A8C957"/>
      <stop offset="100%" style="stop-color:#5A9E6F"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#heroBg)"/>
  <!-- Abstract shapes -->
  <circle cx="200" cy="150" r="120" fill="#3D7A4F" opacity="0.3"/>
  <circle cx="600" cy="400" r="180" fill="#A8C957" opacity="0.15"/>
  <circle cx="400" cy="300" r="80" fill="#5A9E6F" opacity="0.25"/>
  <!-- Grid lines -->
  <g stroke="#A8C957" stroke-width="0.5" opacity="0.2">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <!-- Center element -->
  <rect x="300" y="200" width="200" height="200" rx="20" fill="url(#accent)" opacity="0.4"/>
  <text x="400" y="310" font-family="system-ui, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.8">AI Content</text>
  <text x="400" y="340" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.5">Generative Art</text>
</svg>
